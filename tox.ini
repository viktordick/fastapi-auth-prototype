[tox]
envlist = py3
isolated_build = true

[pytest]

[testenv]
deps =
    ruff
    pytest
    coverage
    psycopg[c]
    pytest-postgresql
    pytest-cov
    pytest-typing
    bandit
    mypy

commands =
    ruff format --check
    ruff check
    bandit -r src
    mypy src
    pytest --doctest-modules --cov-branch --cov=src --cov-report=term-missing {posargs:src}
